<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reflex & Aim Lab</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --primary: #6366f1;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --accent-yellow: #f59e0b;
      --text: #f8fafc;
      --skin: #ffd9b3;
      --skin-shade: #f4bd85;
      --blush-dark: #e14a63;
      --plum: #3a2e39;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    header {
      margin-bottom: 20px;
      text-align: center;
    }

    h1 {
      font-size: 2.2rem;
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .nav-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab-btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      background-color: var(--card-bg);
      color: #94a3b8;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background-color: var(--primary);
      color: white;
      box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
    }

    .game-container {
      width: 100%;
      max-width: 650px;
      height: 440px;
      background-color: var(--card-bg);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      transition: background-color 0.2s;
    }

    /* Reaction Test States */
    .state-waiting { background-color: var(--accent-red); }
    .state-ready { background-color: var(--accent-green); }
    .state-early { background-color: var(--accent-yellow); color: #1e293b; }

    .game-text {
      font-size: 1.5rem;
      font-weight: bold;
      text-align: center;
      padding: 0 20px;
      line-height: 1.5;
      z-index: 10;
    }

    /* AI 입력 설정 패널 (프로젝트 1 스타일에 맞춰 적용) */
    .ai-input-panel {
      width: 100%;
      max-width: 650px;
      margin-bottom: 15px;
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    .ai-input-panel label {
      font-size: 0.9rem;
      color: #a5b4fc;
      font-weight: 600;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    .ai-input-panel input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #4338ca;
      background-color: #1e1b4b;
      color: #f8fafc;
      font-size: 0.95rem;
      outline: none;
    }

    .ai-input-panel input:focus {
      border-color: #818cf8;
    }

    .apply-btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background-color: var(--primary);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    /* 서우 얼굴 배경 (에임 모드 전용) */
    .face-bg {
      position: absolute;
      inset: 0;
      display: none;
      pointer-events: none;
      background: linear-gradient(180deg, #2a2238, #1e1926);
    }

    .head {
      position: absolute; left: 50%; top: 54%; transform: translate(-50%,-50%);
      width: 52%; height: 68%; background: var(--skin);
      border-radius: 48% 48% 42% 42% / 54% 54% 44% 44%;
    }
    .ear { position: absolute; top: 50%; width: 7%; height: 12%; background: var(--skin); border-radius: 50%; }
    .ear.l { left: 21%; } .ear.r { right: 21%; }
    .neck { position: absolute; left: 50%; bottom: 8%; transform: translateX(-50%); width: 18%; height: 14%; background: var(--skin-shade); }
    .hair-wrap {
      position: absolute; left: 50%; top: 12%; transform: translateX(-50%); width: 62%; height: 35%;
      clip-path: polygon(0% 34%, 6% 17%, 16% 6%, 30% 1%, 44% 5%, 50% 15%, 56% 5%, 70% 1%, 84% 6%, 94% 17%, 100% 34%, 100% 58%, 90% 47%, 82% 60%, 73% 44%, 64% 58%, 55% 41%, 46% 57%, 37% 41%, 28% 58%, 19% 44%, 10% 60%, 2% 47%);
    }
    .hair-base { position: absolute; inset: 0; background: #111; }
    .brow { position: absolute; top: 48%; width: 9%; height: 2%; background: #161616; border-radius: 3px; }
    .brow.l { left: 34%; transform: rotate(-3deg); } .brow.r { right: 34%; transform: rotate(3deg); }
    .eye { position: absolute; top: 53%; width: 5%; height: 6%; background: var(--plum); border-radius: 50%; }
    .eye.l { left: 37%; } .eye.r { right: 37%; }
    .mouth { position: absolute; left: 50%; top: 74%; transform: translateX(-50%); width: 10%; height: 2%; border-bottom: 3px solid var(--plum); border-radius: 0 0 40% 40%; }

    /* Aim Target (여드름 형태 적용) */
    .target {
      position: absolute;
      width: 28px;
      height: 28px;
      background: #c98652;
      border: 3px solid #8c5a2e;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      transform: translate(-50%, -50%);
      display: none;
      z-index: 20;
      cursor: pointer;
    }

    /* AI Feedback Box */
    .ai-box {
      width: 100%;
      max-width: 650px;
      margin-top: 20px;
      padding: 16px 20px;
      background-color: #1e1b4b;
      border: 1px solid #4338ca;
      border-radius: 12px;
      display: none;
    }

    .ai-title {
      font-size: 0.9rem;
      color: #a5b4fc;
      margin-bottom: 6px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ai-content {
      font-size: 0.95rem;
      line-height: 1.5;
      color: #e0e7ff;
    }
  </style>
</head>
<body>

  <header>
    <h1>Reflex & Aim Lab</h1>
    <p style="color: #94a3b8;">반응속도와 에임을 테스트하고 AI 피드백을 받아보세요.</p>
  </header>

  <div class="nav-tabs">
    <button class="tab-btn active" onclick="switchMode('reaction')">⚡ 반응속도 테스트</button>
    <button class="tab-btn" onclick="switchMode('aim')">🎯 에임 테스트 (여드름)</button>
  </div>

  <!-- 에임 모드 전용 AI 설정 입력 창 -->
  <div id="aiInputPanel" class="ai-input-panel">
    <label for="promptInput">🤖 AI 타겟(여드름) 설정조건 입력</label>
    <div class="input-row">
      <input type="text" id="promptInput" placeholder="예) 이마 위주로 15개, 볼에는 조금만 있게 해줘" value="이마 위주로 15개, 골고루 배치">
      <button class="apply-btn" onclick="applyAIPrompt()">적용하기</button>
    </div>
  </div>

  <div id="gameWindow" class="game-container">
    <!-- 에임 테스트용 캐릭터 얼굴 배경 -->
    <div id="faceBg" class="face-bg">
      <div class="ear l"></div><div class="ear r"></div><div class="neck"></div>
      <div class="head"></div>
      <div class="hair-wrap"><div class="hair-base"></div></div>
      <div class="brow l"></div><div class="brow r"></div>
      <div class="eye l"></div><div class="eye r"></div>
      <div class="mouth"></div>
    </div>

    <div id="gameText" class="game-text">클릭하여 반응속도 테스트 시작</div>
    <div id="target" class="target"></div>
  </div>

  <div id="aiBox" class="ai-box">
    <div class="ai-title">🤖 Gemini AI 분석</div>
    <div id="aiContent" class="ai-content">분석 중...</div>
  </div>

  <script>
    let currentMode = 'reaction'; // 'reaction' | 'aim'
    
    // Reaction variables
    let reactionState = 'idle'; // idle, waiting, ready
    let timer = null;
    let startTime = 0;

    // Aim variables
    let aimScore = 0;
    let aimTimeLeft = 10;
    let aimInterval = null;
    let targetSpots = []; // AI가 생성한 좌표 목록
    let currentSpotIndex = 0;

    const gameWindow = document.getElementById('gameWindow');
    const gameText = document.getElementById('gameText');
    const target = document.getElementById('target');
    const faceBg = document.getElementById('faceBg');
    const aiInputPanel = document.getElementById('aiInputPanel');
    const promptInput = document.getElementById('promptInput');
    const aiBox = document.getElementById('aiBox');
    const aiContent = document.getElementById('aiContent');

    function switchMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
        btn.classList.toggle('active', (mode === 'reaction' && idx === 0) || (mode === 'aim' && idx === 1));
      });

      aiInputPanel.style.display = (mode === 'aim') ? 'flex' : 'none';
      faceBg.style.display = (mode === 'aim') ? 'block' : 'none';

      resetGame();
    }

    function resetGame() {
      clearTimeout(timer);
      clearInterval(aimInterval);
      gameWindow.className = 'game-container';
      target.style.display = 'none';
      aiBox.style.display = 'none';

      if (currentMode === 'reaction') {
        reactionState = 'idle';
        gameText.innerText = '클릭하여 반응속도 테스트 시작';
      } else {
        gameText.innerText = '클릭하여 10초 에임 테스트 시작\n(설정 조건이 AI 에임에 반영됩니다)';
      }
    }

    // Game Click Handler
    gameWindow.addEventListener('click', (e) => {
      if (currentMode === 'reaction') {
        handleReactionClick();
      } else if (currentMode === 'aim' && !aimInterval && e.target !== target) {
        startAimTest();
      }
    });

    // --- Reaction Logic ---
    function handleReactionClick() {
      if (reactionState === 'idle') {
        reactionState = 'waiting';
        gameWindow.classList.add('state-waiting');
        gameText.innerText = '초록색으로 바뀌면 클릭하세요!';
        
        const randomDelay = Math.floor(Math.random() * 3000) + 2000;
        timer = setTimeout(() => {
          reactionState = 'ready';
          gameWindow.className = 'game-container state-ready';
          gameText.innerText = '지금 클릭하세요!';
          startTime = Date.now();
        }, randomDelay);

      } else if (reactionState === 'waiting') {
        clearTimeout(timer);
        reactionState = 'idle';
        gameWindow.className = 'game-container state-early';
        gameText.innerText = '너무 빨랐습니다! 다시 클릭하여 시도하세요.';

      } else if (reactionState === 'ready') {
        const reactionTime = Date.now() - startTime;
        reactionState = 'idle';
        gameWindow.className = 'game-container';
        gameText.innerText = `반응속도: ${reactionTime} ms\n(다시 하려면 클릭)`;
        
        fetchAIFeedback({ reactionTime, mode: 'reaction' });
      }
    }

    // --- Aim Test & AI Prompt Engine ---
    async function applyAIPrompt() {
      const text = promptInput.value.trim();
      if (!text) return;

      gameText.innerText = "AI가 에임 타겟 좌표를 생성 중입니다...";
      
      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: text, mode: 'generate_spots' })
        });
        const data = await res.json();
        
        if (data.spots && Array.isArray(data.spots) && data.spots.length > 0) {
          targetSpots = data.spots;
        } else {
          targetSpots = parsePromptToSpots(text);
        }
      } catch (err) {
        // AI 통신 실패 시에도 사용자가 입력한 조건대로 정확히 계산해주는 파서 적용
        targetSpots = parsePromptToSpots(text);
      }

      gameText.innerText = `생성 완료! (${targetSpots.length}개 타겟 준비됨)\n클릭하여 10초 에임 테스트 시작`;
    }

    // 입력 문장을 정확히 해석해주는 정밀 맵핑 알고리즘
    function parsePromptToSpots(prompt) {
      let count = 15;
      const countMatch = prompt.match(/(\d+)\s*개/);
      if (countMatch) {
        count = parseInt(countMatch[1], 10);
      }

      const spots = [];
      const hasForehead = prompt.includes('이마');
      const hasCheek = prompt.includes('볼');
      const hasChin = prompt.includes('턱');

      for (let i = 0; i < count; i++) {
        let x, y;
        let choice = Math.random();

        if (hasForehead && (!hasCheek || choice < 0.6)) {
          // 이마 좌표 범위 (중앙 상단)
          x = 35 + Math.random() * 30;
          y = 22 + Math.random() * 18;
        } else if (hasChin && choice > 0.7) {
          // 턱 좌표 범위 (하단)
          x = 40 + Math.random() * 20;
          y = 70 + Math.random() * 12;
        } else if (hasCheek) {
          // 볼 좌표 범위 (좌/우)
          x = Math.random() < 0.5 ? (28 + Math.random() * 15) : (57 + Math.random() * 15);
          y = 48 + Math.random() * 20;
        } else {
          // 전체 골고루 범위
          x = 30 + Math.random() * 40;
          y = 25 + Math.random() * 50;
        }

        spots.push({ x: Math.round(x), y: Math.round(y) });
      }
      return spots;
    }

    function startAimTest() {
      if (targetSpots.length === 0) {
        targetSpots = parsePromptToSpots(promptInput.value);
      }

      aimScore = 0;
      aimTimeLeft = 10;
      currentSpotIndex = 0;
      gameText.innerText = '';
      
      moveTargetToNextSpot();
      target.style.display = 'block';

      aimInterval = setInterval(() => {
        aimTimeLeft--;
        if (aimTimeLeft <= 0) {
          endAimTest();
        }
      }, 1000);
    }

    target.addEventListener('click', (e) => {
      e.stopPropagation();
      if (aimTimeLeft > 0) {
        aimScore++;
        moveTargetToNextSpot();
      }
    });

    function moveTargetToNextSpot() {
      if (currentSpotIndex >= targetSpots.length) {
        currentSpotIndex = 0; // 준비된 좌표를 다 썼으면 다시 순환
      }
      
      const spot = targetSpots[currentSpotIndex];
      target.style.left = `${spot.x}%`;
      target.style.top = `${spot.y}%`;
      currentSpotIndex++;
    }

    function endAimTest() {
      clearInterval(aimInterval);
      aimInterval = null;
      target.style.display = 'none';
      gameText.innerText = `시간 종료!\n최종 제거 점수: ${aimScore} 개\n(다시 하려면 클릭)`;

      fetchAIFeedback({ aimScore, mode: 'aim', prompt: promptInput.value });
    }

    // --- Gemini API Call ---
    async function fetchAIFeedback(payload) {
      aiBox.style.display = 'block';
      aiContent.innerText = '🤖 AI가 결과를 분석하고 있습니다...';

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (data.result) {
          aiContent.innerText = data.result;
        } else {
          aiContent.innerText = '피드백을 가져오지 못했습니다.';
        }
      } catch (err) {
        aiContent.innerText = '오류 발생: AI 피드백을 불러올 수 없습니다.';
      }
    }
  </script>
</body>
</html>

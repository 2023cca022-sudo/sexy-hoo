<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>서우 여드름 짜기 챌린지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --skin: #ffd9b3;
    --skin-shade: #f4bd85;
    --blush: #ff6b81;
    --blush-dark: #e14a63;
    --mint-bg: #eaf7f0;
    --mint-deep: #bfe8d4;
    --plum: #3a2e39;
    --yellow: #ffd23f;
    --white: #fffaf3;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 20%, var(--mint-deep) 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, #ffe3b0 0%, transparent 45%),
      var(--mint-bg);
    font-family: "Noto Sans KR", sans-serif;
    color: var(--plum);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow-x:hidden;
  }
  #app{
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    padding: 24px 20px 40px;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
  }
  .eyebrow{
    font-family:"Gaegu", sans-serif;
    font-weight:700;
    font-size: 15px;
    letter-spacing: 2px;
    color: var(--blush-dark);
    text-transform:uppercase;
    margin-bottom: 4px;
  }
  h1{
    font-family:"Gaegu", sans-serif;
    font-size: 34px;
    font-weight: 700;
    margin: 0 0 4px;
    text-align:center;
    line-height:1.25;
  }
  .sub{
    font-size:14px;
    color:#6b5c68;
    text-align:center;
    margin: 0 0 22px;
    max-width: 320px;
  }
  .screen{ width:100%; display:flex; flex-direction:column; align-items:center; }
  [hidden]{ display:none !important; }

  /* ---------- Start screen ---------- */
  .card{
    width:100%;
    background: var(--white);
    border-radius: 28px;
    padding: 22px;
    box-shadow: 0 14px 0 rgba(58,46,57,0.06), 0 4px 18px rgba(58,46,57,0.08);
    border: 3px solid rgba(58,46,57,0.06);
  }
  label{
    display:block;
    font-weight:700;
    font-size: 13px;
    color: var(--blush-dark);
    margin-bottom: 8px;
  }
  textarea{
    width:100%;
    min-height: 84px;
    resize: vertical;
    border-radius: 16px;
    border: 2px solid #f0e2d6;
    padding: 12px 14px;
    font-family:"Noto Sans KR", sans-serif;
    font-size: 14px;
    background: #fffdf9;
    color: var(--plum);
    outline: none;
    transition: border-color .15s ease;
  }
  textarea:focus{ border-color: var(--blush); }
  .presets{
    display:flex;
    flex-wrap:wrap;
    gap: 8px;
    margin: 12px 0 4px;
  }
  .preset-btn{
    border:none;
    background: var(--mint-deep);
    color: #1f4e37;
    font-size: 12px;
    font-weight:700;
    padding: 7px 12px;
    border-radius: 999px;
    cursor:pointer;
  }
  .preset-btn:hover{ filter: brightness(0.95); }

  .primary-btn{
    width:100%;
    margin-top: 18px;
    border:none;
    background: var(--blush);
    color: white;
    font-family:"Gaegu", sans-serif;
    font-size: 20px;
    font-weight:700;
    padding: 14px;
    border-radius: 18px;
    cursor:pointer;
    box-shadow: 0 6px 0 var(--blush-dark);
    transition: transform .05s ease;
  }
  .primary-btn:active{ transform: translateY(4px); box-shadow: 0 2px 0 var(--blush-dark); }
  .primary-btn:disabled{ opacity:.6; cursor:default; }
  .primary-btn.secondary{
    background: var(--yellow);
    color: var(--plum);
    box-shadow: 0 6px 0 #cf9f00;
  }
  .primary-btn.secondary:active{ box-shadow: 0 2px 0 #cf9f00; }

  .status-line{
    font-size: 12px;
    color:#8a7c86;
    text-align:center;
    margin-top: 10px;
    min-height: 16px;
  }

  /* ---------- HUD ---------- */
  .hud{
    width:100%;
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin-bottom: 16px;
  }
  .pill{
    flex:1;
    background: var(--white);
    border-radius: 16px;
    padding: 10px 6px;
    text-align:center;
    box-shadow: 0 4px 0 rgba(58,46,57,0.07);
  }
  .pill .num{
    font-family:"Gaegu", sans-serif;
    font-size: 26px;
    font-weight:700;
    display:block;
    line-height:1;
  }
  .pill .lbl{
    font-size: 11px;
    color:#8a7c86;
    font-weight:700;
  }
  .pill.timer .num{ color: var(--blush-dark); }
  .pill.score .num{ color: #1f4e37; }
  .pill.combo .num{ color: #a3720b; }

  /* ---------- Face stage ---------- */
  .stage-wrap{
    width:100%;
    background: var(--white);
    border-radius: 28px;
    padding: 14px;
    box-shadow: 0 14px 0 rgba(58,46,57,0.06), 0 4px 18px rgba(58,46,57,0.08);
    border: 3px solid rgba(58,46,57,0.06);
    position:relative;
  }
  #stage{
    position:relative;
    width:100%;
    aspect-ratio: 3 / 4;
    border-radius: 22px;
    overflow:hidden;
    background: linear-gradient(180deg, #fff3e2, #ffe6c9);
    cursor: default;
    touch-action: manipulation;
  }
  .face{
    position:absolute;
    inset:0;
    z-index: 1;
  }
  .head{
    position:absolute;
    left:50%; top:55%;
    transform: translate(-50%,-50%);
    width: 62%;
    aspect-ratio: 1/1.1;
    background: var(--skin);
    border-radius: 46% 46% 40% 40% / 52% 52% 42% 42%;
    box-shadow: inset 0 -20px 32px rgba(244,189,133,.65), inset 0 14px 20px rgba(255,255,255,.5);
  }
  .ear{
    position:absolute;
    top:50%;
    width:9%;
    aspect-ratio:1/1.3;
    background: var(--skin);
    border-radius: 50%;
    z-index: -1;
  }
  .ear.l{ left: 15.5%; }
  .ear.r{ right: 15.5%; }
  .neck{
    position:absolute;
    left:50%; bottom:7%;
    transform: translateX(-50%);
    width: 22%;
    height: 12%;
    background: var(--skin-shade);
    z-index: 0;
  }

  /* natural black hair with a side-swept, slightly messy fringe */
  .hair-wrap{
    position:absolute;
    left:50%; top:9%;
    transform: translateX(-50%);
    width: 76%;
    aspect-ratio: 1/0.95;
    clip-path: polygon(
      0% 32%, 5% 16%, 14% 8%, 26% 3%, 40% 0%, 56% 0%, 70% 3%, 83% 8%, 93% 16%, 100% 32%,
      100% 52%, 91% 46%, 83% 58%, 74% 44%, 66% 56%, 57% 42%, 48% 55%,
      40% 42%, 32% 56%, 24% 44%, 16% 58%, 8% 46%, 0% 52%
    );
  }
  .hair-base{
    position:absolute; inset:0;
    background: linear-gradient(150deg, #0e0e0e, #262626 60%, #0e0e0e);
  }

  .brow{
    position:absolute;
    top:47%;
    width:9.5%;
    height:2.4%;
    background: #161616;
    border-radius: 2px;
  }
  .brow.l{ left: 31%; transform: rotate(-5deg); }
  .brow.r{ right: 31%; transform: rotate(5deg); }

  .eye{
    position:absolute;
    top:53%;
    width: 6.5%;
    aspect-ratio: 1/1.25;
    background: var(--plum);
    border-radius: 50%;
    overflow:hidden;
  }
  .eye::after{
    content:"";
    position:absolute;
    top:18%; left:52%;
    width:32%; height:32%;
    background: rgba(255,255,255,.75);
    border-radius:50%;
  }
  .eye.l{ left: 35.5%; }
  .eye.r{ right: 35.5%; }

  .mouth{
    position:absolute;
    left:50%; top:75.5%;
    transform: translateX(-50%);
    width: 13%;
    height: 2.6%;
    border-bottom: 4px solid var(--plum);
    border-radius: 0 0 40% 40%;
  }

  /* plain black t-shirt neckline */
  .tshirt{
    position:absolute;
    left:50%; bottom:-3%;
    transform: translateX(-50%);
    width: 84%;
    height: 16%;
    background: linear-gradient(160deg, #1c1c1c, #2a2a2a);
    border-radius: 45% 45% 0 0 / 70% 70% 0 0;
    z-index: 2;
  }

  .pimple{
    position:absolute;
    transform: translate(-50%,-50%);
    border-radius: 50%;
    background: #c98652;
    border: 3px solid #8c5a2e;
    box-shadow: 0 2px 5px rgba(0,0,0,.25);
    cursor: pointer;
    animation: pop-in .18s ease-out;
    z-index: 5;
  }
  @keyframes pop-in{ from{ transform: translate(-50%,-50%) scale(0);} to{ transform: translate(-50%,-50%) scale(1);} }

  .splat{
    position:absolute;
    transform: translate(-50%,-50%);
    pointer-events:none;
    font-family:"Gaegu", sans-serif;
    font-weight:700;
    color: var(--blush-dark);
    font-size: 15px;
    animation: float-up .55s ease-out forwards;
    z-index: 6;
  }
  @keyframes float-up{
    0%{ opacity:1; transform: translate(-50%,-50%) scale(.8);}
    100%{ opacity:0; transform: translate(-50%,-140%) scale(1.1);}
  }
  .burst{
    position:absolute;
    width:2px;height:2px;
    border-radius:50%;
    background: var(--blush);
    pointer-events:none;
    z-index:6;
  }

  #timer-bar-wrap{
    width:100%;
    height:8px;
    background:#f0e2d6;
    border-radius:999px;
    margin-top:12px;
    overflow:hidden;
  }
  #timer-bar{
    height:100%;
    background: linear-gradient(90deg, var(--blush), var(--yellow));
    width:100%;
    transition: width .1s linear;
  }

  /* ---------- End screen ---------- */
  .result-num{
    font-family:"Gaegu", sans-serif;
    font-size: 64px;
    font-weight:700;
    color: var(--blush-dark);
    line-height:1;
    margin: 6px 0 0;
  }
  .result-lbl{ font-size:13px; color:#8a7c86; font-weight:700; }
  .stat-row{
    display:flex;
    gap:10px;
    width:100%;
    margin-top: 18px;
  }
  .stat{
    flex:1;
    background: var(--mint-bg);
    border-radius:14px;
    padding: 10px;
    text-align:center;
  }
  .stat .n{ font-weight:900; font-size:18px; }
  .stat .l{ font-size:11px; color:#6b5c68; }
  .footnote{
    font-size:11px;
    color:#a89aa3;
    text-align:center;
    margin-top:18px;
    line-height:1.5;
  }
</style>
</head>
<body>
<div id="app">
  <div class="eyebrow">POP · POP · SEOU</div>
  <h1>서우 여드름 짜기 챌린지</h1>
  <p class="sub">여드름을 어떻게 만들지 서우에게 알려주면, AI가 오늘의 얼굴을 준비해요.</p>

  <!-- START SCREEN -->
  <section id="start-screen" class="screen">
    <div class="card">
      <label for="prompt-input">오늘의 여드름 컨디션을 알려주세요</label>
      <textarea id="prompt-input" placeholder="예) 이마 위주로 여드름이 많고, 볼에는 콩알만한 게 몇 개 있어"></textarea>
      <div class="presets">
        <button class="preset-btn" data-p="이마에 여드름이 잔뜩 났어, 20개 정도">이마 폭발형</button>
        <button class="preset-btn" data-p="얼굴 전체에 골고루 작은 여드름, 15개">전체 잡티형</button>
        <button class="preset-btn" data-p="턱과 볼 위주로 크고 뾰족한 여드름 10개, 시간은 짧게">턱선 집중형</button>
      </div>
      <button id="generate-btn" class="primary-btn">AI에게 여드름 생성 요청하기</button>
      <div id="status-line" class="status-line"></div>
    </div>
  </section>

  <!-- GAME SCREEN -->
  <section id="game-screen" class="screen" hidden>
    <div class="hud">
      <div class="pill timer"><span id="hud-time" class="num">30</span><span class="lbl">남은 시간</span></div>
      <div class="pill score"><span id="hud-score" class="num">0</span><span class="lbl">터트린 개수</span></div>
      <div class="pill combo"><span id="hud-combo" class="num">0</span><span class="lbl">콤보</span></div>
    </div>
    <div class="stage-wrap">
      <div id="stage">
        <div class="face">
          <div class="ear l"></div>
          <div class="ear r"></div>
          <div class="neck"></div>
          <div class="head"></div>
          <div class="hair-wrap">
            <div class="hair-base"></div>
          </div>
          <div class="brow l"></div>
          <div class="brow r"></div>
          <div class="eye l"></div>
          <div class="eye r"></div>
          <div class="mouth"></div>
          <div class="tshirt"></div>
        </div>
        <!-- pimples get injected here -->
      </div>
      <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
    </div>
  </section>

  <!-- END SCREEN -->
  <section id="end-screen" class="screen" hidden>
    <div class="card" style="text-align:center;">
      <div class="result-lbl">최종 기록</div>
      <div id="final-score" class="result-num">0</div>
      <div class="result-lbl">개 터뜨림</div>
      <div class="stat-row">
        <div class="stat"><div id="stat-spawned" class="n">0</div><div class="l">생성된 여드름</div></div>
        <div class="stat"><div id="stat-accuracy" class="n">0%</div><div class="l">처리율</div></div>
        <div class="stat"><div id="stat-best-combo" class="n">0</div><div class="l">최고 콤보</div></div>
      </div>
      <button id="retry-btn" class="primary-btn">다시 도전하기</button>
      <button id="new-prompt-btn" class="primary-btn secondary">다른 조건으로 다시 만들기</button>
    </div>
  </section>

  <div class="footnote">AI가 생성한 여드름 배치는 가상의 캐릭터 얼굴 위에서만 표시됩니다.</div>
</div>

<script>
(function(){
  const startScreen = document.getElementById('start-screen');
  const gameScreen = document.getElementById('game-screen');
  const endScreen = document.getElementById('end-screen');
  const promptInput = document.getElementById('prompt-input');
  const generateBtn = document.getElementById('generate-btn');
  const statusLine = document.getElementById('status-line');
  const stage = document.getElementById('stage');
  const hudTime = document.getElementById('hud-time');
  const hudScore = document.getElementById('hud-score');
  const hudCombo = document.getElementById('hud-combo');
  const timerBar = document.getElementById('timer-bar');
  const finalScore = document.getElementById('final-score');
  const statSpawned = document.getElementById('stat-spawned');
  const statAccuracy = document.getElementById('stat-accuracy');
  const statBestCombo = document.getElementById('stat-best-combo');
  const retryBtn = document.getElementById('retry-btn');
  const newPromptBtn = document.getElementById('new-prompt-btn');

  document.querySelectorAll('.preset-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{ promptInput.value = btn.dataset.p; });
  });

  let spec = null;          // {count, duration, spots:[{region,x,y,size}]}
  let spawnQueue = [];
  let score = 0, spawnedCount = 0, combo = 0, bestCombo = 0;
  let timeLeft = 30, totalTime = 30;
  let gameTimer = null, spawnTimer = null;
  let running = false;

  const SIZE_PX = { small: 5.5, medium: 8, large: 11 }; // % of stage width

  function fallbackSpec(promptText){
    const count = Math.min(30, Math.max(8, Math.round(8 + (promptText||'').length / 6)));
    const duration = /짧|빨리|스피드/.test(promptText||'') ? 20 : 30;
    const regions = ['forehead','cheek-left','cheek-right','chin','nose'];
    const spots = Array.from({length: count}).map(()=>{
      const region = regions[Math.floor(Math.random()*regions.length)];
      return {
        region,
        x: 30 + Math.random()*40,
        y: 25 + Math.random()*55,
        size: ['small','small','medium','medium','large'][Math.floor(Math.random()*5)]
      };
    });
    return { count, duration, spots };
  }

  async function requestSpec(promptText){
    try{
      const res = await fetch('/api/generate', {
        method:'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ prompt: promptText })
      });
      if(!res.ok) throw new Error('API 응답 오류 (' + res.status + ')');
      const data = await res.json();
      if(!data || !Array.isArray(data.spots) || data.spots.length === 0) throw new Error('형식 오류');
      return {
        count: Math.max(1, Math.min(60, Number(data.count) || data.spots.length)),
        duration: Math.max(10, Math.min(90, Number(data.duration) || 30)),
        spots: data.spots.map(s=>({
          region: s.region || 'forehead',
          x: clamp(Number(s.x), 8, 92),
          y: clamp(Number(s.y), 8, 92),
          size: ['small','medium','large'].includes(s.size) ? s.size : 'medium'
        }))
      };
    }catch(err){
      console.warn('AI 생성 실패, 임의 생성으로 대체:', err.message);
      statusLine.textContent = 'AI 연결에 실패해서 임의로 여드름을 만들었어요.';
      return fallbackSpec(promptText);
    }
  }

  function clamp(v,min,max){
    if(Number.isNaN(v)) return (min+max)/2;
    return Math.min(max, Math.max(min, v));
  }

  generateBtn.addEventListener('click', async ()=>{
    generateBtn.disabled = true;
    statusLine.textContent = 'AI가 서우의 얼굴 상태를 분석하고 있어요...';
    const promptText = promptInput.value.trim() || '얼굴 전체에 여드름 15개, 골고루';
    spec = await requestSpec(promptText);
    generateBtn.disabled = false;
    startGame();
  });

  function startGame(){
    score = 0; spawnedCount = 0; combo = 0; bestCombo = 0;
    timeLeft = spec.duration; totalTime = spec.duration;
    spawnQueue = spec.spots.slice();
    hudScore.textContent = '0';
    hudCombo.textContent = '0';
    hudTime.textContent = String(timeLeft);
    timerBar.style.width = '100%';
    stage.querySelectorAll('.pimple, .splat').forEach(el=>el.remove());

    startScreen.hidden = true;
    endScreen.hidden = true;
    gameScreen.hidden = false;
    running = true;

    const spawnInterval = Math.max(250, (spec.duration*1000*0.65) / Math.max(1, spec.count));
    spawnTimer = setInterval(()=>{
      if(!running) return;
      if(spawnQueue.length === 0){ clearInterval(spawnTimer); return; }
      const s = spawnQueue.shift();
      spawnPimple(s);
    }, spawnInterval);

    gameTimer = setInterval(()=>{
      timeLeft -= 1;
      hudTime.textContent = String(Math.max(0, timeLeft));
      timerBar.style.width = Math.max(0,(timeLeft/totalTime*100)) + '%';
      if(timeLeft <= 0){ endGame(); }
    }, 1000);
  }

  function spawnPimple(s){
    spawnedCount++;
    const el = document.createElement('div');
    el.className = 'pimple';
    const sizePct = SIZE_PX[s.size] || 8;
    el.style.width = sizePct + '%';
    el.style.left = s.x + '%';
    el.style.top = s.y + '%';
    el.addEventListener('click', (e)=> popPimple(el, e), { once:true });
    stage.appendChild(el);

    // auto-expire a spawned pimple after a while so the board doesn't overflow
    setTimeout(()=>{
      if(el.isConnected){
        el.style.transition = 'opacity .3s ease';
        el.style.opacity = '0';
        combo = 0;
        hudCombo.textContent = '0';
        setTimeout(()=> el.remove(), 300);
      }
    }, Math.max(2200, totalTime*70));
  }

  function popPimple(el, evt){
    if(!running) return;
    const rect = stage.getBoundingClientRect();
    const x = el.offsetLeft, y = el.offsetTop;
    el.remove();
    score++; combo++; bestCombo = Math.max(bestCombo, combo);
    hudScore.textContent = String(score);
    hudCombo.textContent = String(combo);

    const splat = document.createElement('div');
    splat.className = 'splat';
    splat.textContent = combo >= 5 ? '+1 콤보 연속!' : '+1';
    splat.style.left = x + 'px';
    splat.style.top = y + 'px';
    stage.appendChild(splat);
    setTimeout(()=> splat.remove(), 600);

    for(let i=0;i<6;i++){
      const b = document.createElement('div');
      b.className = 'burst';
      const angle = Math.random()*Math.PI*2;
      const dist = 14 + Math.random()*14;
      b.style.left = x + 'px';
      b.style.top = y + 'px';
      b.style.transform = 'translate(0,0)';
      b.style.transition = 'transform .35s ease-out, opacity .35s ease-out';
      stage.appendChild(b);
      requestAnimationFrame(()=>{
        b.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        b.style.opacity = '0';
      });
      setTimeout(()=> b.remove(), 380);
    }
  }

  function endGame(){
    running = false;
    clearInterval(gameTimer);
    clearInterval(spawnTimer);
    stage.querySelectorAll('.pimple').forEach(el=> el.remove());

    finalScore.textContent = String(score);
    statSpawned.textContent = String(spawnedCount);
    statAccuracy.textContent = spawnedCount ? Math.round(score/spawnedCount*100) + '%' : '0%';
    statBestCombo.textContent = String(bestCombo);

    gameScreen.hidden = true;
    endScreen.hidden = false;
  }

  retryBtn.addEventListener('click', ()=>{ if(spec) startGame(); });
  newPromptBtn.addEventListener('click', ()=>{
    endScreen.hidden = true;
    startScreen.hidden = false;
    statusLine.textContent = '';
  });
})();
</script>
</body>
</html>

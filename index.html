<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reflex & Aim Lab</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --primary: #6366f1;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --accent-yellow: #f59e0b;
      --text: #f8fafc;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    header {
      margin-bottom: 20px;
      text-align: center;
    }

    h1 {
      font-size: 2.2rem;
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .nav-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab-btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      background-color: var(--card-bg);
      color: #94a3b8;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background-color: var(--primary);
      color: white;
      box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
    }

    .game-container {
      width: 100%;
      max-width: 650px;
      height: 400px;
      background-color: var(--card-bg);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      transition: background-color 0.2s;
    }

    /* Reaction Test States */
    .state-waiting { background-color: var(--accent-red); }
    .state-ready { background-color: var(--accent-green); }
    .state-early { background-color: var(--accent-yellow); }

    .game-text {
      font-size: 1.5rem;
      font-weight: bold;
      text-align: center;
      padding: 0 20px;
    }

    /* Aim Test Target */
    .target {
      position: absolute;
      width: 45px;
      height: 45px;
      background: radial-gradient(circle, #f43f5e 30%, #e11d48 100%);
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(244, 63, 94, 0.6);
      transform: translate(-50%, -50%);
      display: none;
    }

    /* AI Feedback Box */
    .ai-box {
      width: 100%;
      max-width: 650px;
      margin-top: 20px;
      padding: 16px 20px;
      background-color: #1e1b4b;
      border: 1px solid #4338ca;
      border-radius: 12px;
      display: none;
    }

    .ai-title {
      font-size: 0.9rem;
      color: #a5b4fc;
      margin-bottom: 6px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ai-content {
      font-size: 0.95rem;
      line-height: 1.5;
      color: #e0e7ff;
    }
  </style>
</head>
<body>

  <header>
    <h1>Reflex & Aim Lab</h1>
    <p style="color: #94a3b8;">반응속도와 에임을 테스트하고 AI 피드백을 받아보세요.</p>
  </header>

  <div class="nav-tabs">
    <button class="tab-btn active" onclick="switchMode('reaction')">⚡ 반응속도 테스트</button>
    <button class="tab-btn" onclick="switchMode('aim')">🎯 에임 테스트</button>
  </div>

  <div id="gameWindow" class="game-container">
    <div id="gameText" class="game-text">클릭하여 반응속도 테스트 시작</div>
    <div id="target" class="target"></div>
  </div>

  <div id="aiBox" class="ai-box">
    <div class="ai-title">🤖 Gemini AI 분석</div>
    <div id="aiContent" class="ai-content">분석 중...</div>
  </div>

  <script>
    let currentMode = 'reaction'; // 'reaction' | 'aim'
    
    // Reaction variables
    let reactionState = 'idle'; // idle, waiting, ready
    let timer = null;
    let startTime = 0;

    // Aim variables
    let aimScore = 0;
    let aimTimeLeft = 10;
    let aimInterval = null;

    const gameWindow = document.getElementById('gameWindow');
    const gameText = document.getElementById('gameText');
    const target = document.getElementById('target');
    const aiBox = document.getElementById('aiBox');
    const aiContent = document.getElementById('aiContent');

    function switchMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
        btn.classList.toggle('active', (mode === 'reaction' && idx === 0) || (mode === 'aim' && idx === 1));
      });
      resetGame();
    }

    function resetGame() {
      clearTimeout(timer);
      clearInterval(aimInterval);
      gameWindow.className = 'game-container';
      target.style.display = 'none';
      aiBox.style.display = 'none';

      if (currentMode === 'reaction') {
        reactionState = 'idle';
        gameText.innerText = '클릭하여 반응속도 테스트 시작';
      } else {
        gameText.innerText = '클릭하여 10초 에임 테스트 시작';
      }
    }

    // Game Click Handler
    gameWindow.addEventListener('click', (e) => {
      if (currentMode === 'reaction') {
        handleReactionClick();
      } else if (currentMode === 'aim' && !aimInterval && e.target !== target) {
        startAimTest();
      }
    });

    // --- Reaction Logic ---
    function handleReactionClick() {
      if (reactionState === 'idle') {
        reactionState = 'waiting';
        gameWindow.classList.add('state-waiting');
        gameText.innerText = '초록색으로 바뀌면 클릭하세요!';
        
        const randomDelay = Math.floor(Math.random() * 3000) + 2000;
        timer = setTimeout(() => {
          reactionState = 'ready';
          gameWindow.className = 'game-container state-ready';
          gameText.innerText = '지금 클릭하세요!';
          startTime = Date.now();
        }, randomDelay);

      } else if (reactionState === 'waiting') {
        clearTimeout(timer);
        reactionState = 'idle';
        gameWindow.className = 'game-container state-early';
        gameText.innerText = '너무 빨랐습니다! 다시 클릭하여 시도하세요.';

      } else if (reactionState === 'ready') {
        const reactionTime = Date.now() - startTime;
        reactionState = 'idle';
        gameWindow.className = 'game-container';
        gameText.innerText = `반응속도: ${reactionTime} ms\n(다시 하려면 클릭)`;
        
        fetchAIFeedback({ reactionTime, mode: 'reaction' });
      }
    }

    // --- Aim Test Logic ---
    function startAimTest() {
      aimScore = 0;
      aimTimeLeft = 10;
      gameText.innerText = '';
      moveTarget();
      target.style.display = 'block';

      aimInterval = setInterval(() => {
        aimTimeLeft--;
        if (aimTimeLeft <= 0) {
          endAimTest();
        }
      }, 1000);
    }

    target.addEventListener('click', (e) => {
      e.stopPropagation();
      if (aimTimeLeft > 0) {
        aimScore++;
        moveTarget();
      }
    });

    function moveTarget() {
      const containerRect = gameWindow.getBoundingClientRect();
      const x = Math.random() * (containerRect.width - 60) + 30;
      const y = Math.random() * (containerRect.height - 60) + 30;
      target.style.left = `${x}px`;
      target.style.top = `${y}px`;
    }

    function endAimTest() {
      clearInterval(aimInterval);
      aimInterval = null;
      target.style.display = 'none';
      gameText.innerText = `시간 종료!\n최종 점수: ${aimScore} 개\n(다시 하려면 클릭)`;

      fetchAIFeedback({ aimScore, mode: 'aim' });
    }

    // --- Gemini API Call ---
    async function fetchAIFeedback(payload) {
      aiBox.style.display = 'block';
      aiContent.innerText = '🤖 AI가 결과를 분석하고 있습니다...';

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (data.result) {
          aiContent.innerText = data.result;
        } else {
          aiContent.innerText = '피드백을 가져오지 못했습니다.';
        }
      } catch (err) {
        aiContent.innerText = '오류 발생: AI 피드백을 불러올 수 없습니다.';
      }
    }
  </script>
</body>
</html>

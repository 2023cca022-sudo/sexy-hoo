<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>서율 앱</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f5f7;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  }
  .card {
    background: #fff;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    width: 90%;
    max-width: 420px;
    text-align: center;
  }
  h1 {
    font-size: 20px;
    margin-bottom: 20px;
    color: #222;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    font-size: 16px;
    border: 1px solid #ddd;
    border-radius: 8px;
    margin-bottom: 12px;
  }
  button {
    width: 100%;
    padding: 12px 14px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #111;
    color: #fff;
    cursor: pointer;
  }
  button:disabled {
    background: #999;
    cursor: not-allowed;
  }
  .result {
    margin-top: 20px;
    font-size: 28px;
    font-weight: bold;
    min-height: 40px;
    color: #111;
  }
  .error {
    margin-top: 12px;
    color: #d33;
    font-size: 14px;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>이름을 입력해보세요</h1>
    <input id="nameInput" type="text" placeholder="예: 서율" />
    <button id="submitBtn">확인</button>
    <div class="result" id="result"></div>
    <div class="error" id="error"></div>
  </div>

<script>
  const input = document.getElementById('nameInput');
  const btn = document.getElementById('submitBtn');
  const result = document.getElementById('result');
  const errorBox = document.getElementById('error');

  async function submit() {
    const name = input.value.trim();
    if (!name) return;

    btn.disabled = true;
    result.textContent = '';
    errorBox.textContent = '';

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || '요청 처리 중 오류가 발생했습니다.');
      }

      const data = await res.json();
      result.textContent = data.reply;
    } catch (err) {
      errorBox.textContent = err.message;
    } finally {
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', submit);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submit();
  });
</script>
</body>
</html>
